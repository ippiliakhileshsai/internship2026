<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ConnectMyEvent</title>
  
  <!-- CSS Styling files -->
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/utilities.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  
  <style>
    body {
      background-color: var(--bg-body);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-12) var(--space-4);
      background: radial-gradient(circle at 10% 10%, var(--brand-indigo-50) 0%, transparent 40%),
                  radial-gradient(circle at 90% 90%, var(--brand-coral-100) 0%, transparent 40%),
                  var(--bg-body);
    }
    
    .auth-card {
      background: var(--bg-surface);
      width: 100%;
      max-width: 440px;
      padding: var(--space-8);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-xl);
      border: 1.5px solid var(--border-color);
      transition: all var(--transition-base);
    }
    
    .auth-card:hover {
      border-color: var(--brand-indigo-300);
      box-shadow: 0 24px 64px rgba(15,11,46,0.12);
    }

    .brand-logo {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: var(--font-extrabold);
      color: var(--brand-indigo-600);
      margin-bottom: var(--space-2);
      text-decoration: none;
    }
    
    .brand-logo span {
      color: var(--brand-coral-500);
    }
  </style>
</head>
<body>

  <!-- Header Placeholder -->
  <div id="header-placeholder"></div>

  <div class="auth-container">
    <div class="auth-card anim-slide">
      <div class="text-center mb-8">
        <a href="../index.html" class="brand-logo">
          <i data-lucide="layers" style="color: var(--brand-indigo-500); width: 26px; height: 26px;"></i>
          Connect<span>MyEvent</span>
        </a>
        <p class="text-sm text-secondary">Welcome back! Please enter your credentials.</p>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <!-- Error Notice Container -->
        <div id="loginError" style="display: none; background: rgba(239, 68, 68, 0.08); border: 1.5px solid var(--error); color: var(--error); border-radius: var(--radius-lg); padding: var(--space-3) var(--space-4); margin-bottom: var(--space-4); font-size: var(--text-xs); font-weight: var(--font-bold); line-height: 1.4;">
          Invalid email or password. Please verify your credentials or register free.
        </div>

        <div class="input-group">
          <label class="input-label" for="emailInput">Email address</label>
          <input type="email" id="emailInput" class="input" placeholder="name@college.edu" required>
        </div>
        <div class="input-group">
          <div class="flex justify-between items-center">
            <label class="input-label" for="passwordInput">Password</label>
            <a href="#" class="text-xs fw-bold text-indigo">Forgot password?</a>
          </div>
          <input type="password" id="passwordInput" autocomplete="current-password" class="input" placeholder="••••••••" required>
        </div>
        
        <div class="flex justify-between items-center mb-6 text-sm">
          <label class="flex items-center gap-2 cursor-pointer text-xs text-secondary">
            <input type="checkbox" style="accent-color: var(--brand-indigo-500); width: 14px; height: 14px;"> 
            <span>Remember for 30 days</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg mb-4">Sign In</button>
        <button type="button" class="btn btn-ghost btn-full btn-lg" onclick="socialLogin()">
          <i data-lucide="github" style="width: 18px; height: 18px;"></i> Sign in with GitHub
        </button>
      </form>

      <p class="text-center text-sm text-secondary mt-8" style="margin-bottom:0;">
        Don't have an account yet? <a href="register.html" class="text-indigo fw-bold">Sign up free</a>
      </p>
    </div>
  </div>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    // Initialize default seed accounts if they don't exist
    if (!localStorage.getItem("registeredUsers")) {
      const defaultUsers = [
        {
          name: "Jane Participant",
          email: "participant@connectmyevent.com",
          password: "password123",
          role: "participant"
        },
        {
          name: "Alex Organizer",
          email: "organizer@connectmyevent.com",
          password: "password123",
          role: "organizer"
        }
      ];
      localStorage.setItem("registeredUsers", JSON.stringify(defaultUsers));
    }

    function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById("emailInput").value.toLowerCase().trim();
      const password = document.getElementById("passwordInput").value;
      const errorDiv = document.getElementById("loginError");
      
      errorDiv.style.display = "none";
      
      // Load users safely
      let users = [];
      try {
        users = JSON.parse(localStorage.getItem("registeredUsers") || "[]");
        if (!Array.isArray(users)) users = [];
      } catch (err) {
        users = [];
      }
      
      const matchedUser = users.find(u => u.email === email && u.password === password);
      
      if (matchedUser) {
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("userName", matchedUser.name);
        localStorage.setItem("userEmail", matchedUser.email);
        localStorage.setItem("userRole", matchedUser.role);
        
        // Redirect back to home landing page
        window.location.href = "../index.html";
      } else {
        // Show error feedback
        errorDiv.style.display = "block";
      }
    }

    function socialLogin() {
      // Simulate registering social login user if not existing
      let users = [];
      try {
        users = JSON.parse(localStorage.getItem("registeredUsers") || "[]");
        if (!Array.isArray(users)) users = [];
      } catch (err) {
        users = [];
      }
      
      const email = "github-user@github.com";
      let user = users.find(u => u.email === email);
      
      if (!user) {
        user = {
          name: "GitHub Coder",
          email: email,
          password: "github-password",
          role: "participant"
        };
        users.push(user);
        localStorage.setItem("registeredUsers", JSON.stringify(users));
      }
      
      localStorage.setItem("isLoggedIn", "true");
      localStorage.setItem("userName", user.name);
      localStorage.setItem("userEmail", user.email);
      localStorage.setItem("userRole", user.role);
      window.location.href = "../index.html";
    }
  </script>
</body>
</html>
