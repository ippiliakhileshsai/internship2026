<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HeatQuest | Welcome</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-index">
  <main class="center-page">
    <section class="hero-card">
      <div class="badge">🔥 ❄️</div>
      <h1>Welcome to HeatQuest</h1>
      <p>
        Explore how materials react when they are heated or cooled.
        Predict, observe, and learn through a simple science simulator.
      </p>

      <div class="input-row">
        <input id="nameInput" type="text" maxlength="24" placeholder="Enter your name" aria-label="Enter your name">
        <button id="startBtn" class="btn btn-primary">Start Exploring</button>
      </div>

      <p class="hint">Press Enter to continue.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
