<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plastic Types - MVP</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <h1>Plastics: Types, Properties & Environmental Issues</h1>
  
  <div class="concept">
    <h2>My MVP Concept</h2>
    <p>Click button to show PET plastic info</p>
    <button onclick="showInfo()">Show PET Plastic</button>
    <div id="output"></div>
  </div>

  <script>
    function showInfo() {
      document.getElementById('output').innerHTML = 
        '<b>PET Plastic:</b> Used in water bottles. Recyclable but takes 450+ years to decompose.';
    }
  </script>
</body>
</html>
