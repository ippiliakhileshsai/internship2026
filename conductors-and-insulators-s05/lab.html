<body>

<h1>🧪 Virtual Sorting Lab</h1>

<p class="instructions">
Drag the items into the correct box.
</p>

<div class="items">

<div class="item" draggable="true" id="Copper">
Copper Wire
</div>

<div class="item" draggable="true" id="Coin">
Coin
</div>

<div class="item" draggable="true" id="Spoon">
Metal Spoon
</div>

<div class="item" draggable="true" id="Rubber">
Rubber
</div>

<div class="item" draggable="true" id="Plastic">
Plastic
</div>

<div class="item" draggable="true" id="Wood">
Wood
</div>

</div>

<div class="boxes">

<div class="box"
ondragover="allowDrop(event)"
ondrop="dropConductor(event)">
<h2>⚡ Conductors</h2>
</div>

<div class="box"
ondragover="allowDrop(event)"
ondrop="dropInsulator(event)">
<h2>🛡️ Insulators</h2>
</div>

</div>

<div id="score">
Score: 0 / 6
</div>

<div class="nextBtn" id="nextBtn">
<a href="certificate.html">
🏆 Get Certificate
</a>
</div>

<script>

let score = 0;
let placed = 0;

const conductors = ["Copper","Coin","Spoon"];
const insulators = ["Rubber","Plastic","Wood"];

function allowDrop(ev){
ev.preventDefault();
}

document.querySelectorAll(".item").forEach(item=>{
item.addEventListener("dragstart",function(ev){
ev.dataTransfer.setData("text",ev.target.id);
});
});

function updateScore(){

document.getElementById("score").innerHTML=
`Score: ${score} / 6`;

if(placed===6){
document.getElementById("nextBtn").style.display="block";
}

}

function dropConductor(ev){

ev.preventDefault();

let data = ev.dataTransfer.getData("text");

let element = document.getElementById(data);

if(conductors.includes(data)){
score++;
element.style.background="#22c55e";
}
else{
element.style.background="#ef4444";
}

ev.target.appendChild(element);

placed++;

updateScore();

}

function dropInsulator(ev){

ev.preventDefault();

let data = ev.dataTransfer.getData("text");

let element = document.getElementById(data);

if(insulators.includes(data)){
score++;
element.style.background="#22c55e";
}
else{
element.style.background="#ef4444";
}

ev.target.appendChild(element);

placed++;

updateScore();

}

</script>

</body>
