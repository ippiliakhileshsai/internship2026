<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UniERP — College Management System</title>
<link rel="stylesheet" href="css/app.css"/>
</head>
<body>

<!-- ══════════════════ LOGIN ══════════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">🎓</div>
      <h1>UniERP</h1>
      <p>College Management System</p>
    </div>
    <div class="form-group">
      <label>User ID</label>
      <input type="text" id="loginId" placeholder="Enter your ID" autocomplete="off"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter password"/>
    </div>
    <button class="btn" onclick="doLogin()">Sign In</button>
    <div class="login-hint">
      <strong>Demo credentials</strong><br>
      🔴 Admin &nbsp;→ <code>admin</code> / <code>admin123</code><br>
      
    </div>
  </div>
</div>

<!-- ══════════════════ APP ══════════════════ -->
<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-brand">
      <div class="logo-row">
        <div class="logo-sq">🎓</div>
        <span>UniERP</span>
      </div>
      <span id="sideRoleBadge" class="role-badge"></span>
    </div>
    <div class="sidebar-user">
      <div class="uname" id="sideUserName">—</div>
      <div class="uid" id="sideUserId">—</div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="logout-btn" onclick="doLogout()">🚪 <span>Sign out</span></div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div class="topbar">
      <h2 id="pageTitle">Dashboard</h2>
      <div class="topbar-right">
        <span id="topDate" style="font-size:12px;color:var(--muted)"></span>
        <div class="tb-avatar" id="topAvatar">A</div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ══════════════════ MODAL ══════════════════ -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Modal</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>


<script src="js/data.js"></script>
<script src="js/ui.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/auth.js"></script>
<script src="js/router.js"></script>
<script src="js/shared.js"></script>
<script src="js/admin.js"></script>
<script src="js/faculty.js"></script>
<script src="js/student.js"></script>
<script src="js/app.js"></script>
</body>
</html>
