<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Atom Universe</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <!-- Logo -->

   <div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg" width="120">
</div>

    <!-- Title -->

    <h1 class="title">
        <span class="star">✨</span>
        Atom Universe
        <span class="star">✨</span>
    </h1>

    <p class="subtitle">
        Enter the 3D World of Atomic Science
    </p>

    <!-- Form -->

    <div class="form-section">

        <h2>Enter Your Name</h2>

        <input
            type="text"
            placeholder="Enter your name"
        >

        <h2>Select Your Difficulty</h2>

        <!-- Easy -->

       <div class="difficulty-card">
    <label>

        <input type="radio" name="difficulty">

        <div class="difficulty-info">

            <div class="difficulty-top">
                <h3>🌱 Easy</h3>
                <span class="level-text">Beginner</span>
            </div>

            <p>Learn the Basics</p>

        </div>

    </label>
</div>

<div class="difficulty-card">
    <label>

        <input type="radio" name="difficulty">

        <div class="difficulty-info">

            <div class="difficulty-top">
                <h3>🚀 Medium</h3>
                <span class="level-text">Intermediate</span>
            </div>

            <p>Explore and Practice</p>

        </div>

    </label>
</div>

<div class="difficulty-card">
    <label>

        <input type="radio" name="difficulty">

        <div class="difficulty-info">

            <div class="difficulty-top">
                <h3>🔥 Difficult</h3>
                <span class="level-text">Advanced</span>
            </div>

            <p>Challenge Yourself</p>

        </div>

    </label>
</div>

        <!-- Button -->

       <a href="dashboard.html" class="start-btn">
    🚀 Start Exploration
</a>

    </div>

    <!-- Footer -->

    <footer>
        🎮 Learning • 🚀 Models • 🏆 Badges
    </footer>

</div>

</body>
</html>
