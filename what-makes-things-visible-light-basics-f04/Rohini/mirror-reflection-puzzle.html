<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirror Reflection Puzzle</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
    text-align: center;
    padding-top: 50px;
}

h1{
    color: #333;
}

#game{
    margin-top: 40px;
}

#light{
    font-size: 60px;
}

#mirror1{
    font-size: 25px;
    padding: 15px;
    margin: 20px;
    border-radius: 10px;
    cursor: pointer;
}

#flower{
    font-size: 60px;
}

button{
    padding: 12px 20px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
}

button:hover{
    background-color: #45a049;
}

#result{
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
    color: green;
}
</style>
</head>

<body>

<h1>Mirror Reflection Puzzle (Rohini)</h1>
<p>Rotate mirrors to direct light toward the hidden flower.</p>

<div id="game">
    <div id="light">🔦</div>

    <button id="mirror1">Mirror /</button>

    <div id="flower">🌸</div>
</div>

<br>

<button onclick="rotateMirror()">Rotate Mirror</button>

<p id="result"></p>

<script>
let state = 0;

function rotateMirror() {
    state++;

    if (state % 2 === 1) {
        document.getElementById("mirror1").innerText = "Mirror \\";
        document.getElementById("result").innerText =
        "🌸 Flower reached by light! Puzzle Solved!";
    } else {
        document.getElementById("mirror1").innerText = "Mirror /";
        document.getElementById("result").innerText = "";
    }
}
</script>

</body>
